site:
  name: PSI Monitor
  site: 'https://psimonitor.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: PSI Monitor
    template: '%s — PSI Monitor'
  description: "PSI Monitor measures your trading psychology stability in real time inside NinjaTrader 8 — seven behavioral dimensions, local-only data, no signals."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: PSI Monitor
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@psimonitor'
    site: '@psimonitor'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

# Light-first UI — calm, modern feel for a psychology product
ui:
  theme: 'light:only'
